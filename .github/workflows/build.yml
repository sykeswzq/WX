name: Build WeChatNoAds74

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Theos
      run: |
        sudo apt-get update
        sudo apt-get install -y git perl curl wget libxml2-dev libtool libtool-bin autoconf automake
        git clone --recursive https://github.com/theos/theos.git /home/runner/theos

    - name: Install iOS SDK
      run: |
        SDKS_DIR="/home/runner/theos/sdks"
        mkdir -p "$SDKS_DIR"
        wget -q "https://github.com/theos/sdks/archive/master.tar.gz" -O /tmp/sdks.tar.gz
        tar xzf /tmp/sdks.tar.gz -C /tmp
        mv /tmp/sdks-master/*.sdk "$SDKS_DIR/" 2>/dev/null || true

    - name: Install Toolchain
      run: |
        TOOLCHAIN_DIR="/home/runner/theos/toolchain"
        mkdir -p "$TOOLCHAIN_DIR"
        wget -q "https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.3.0/swift-5.8-ubuntu22.04.tar.xz" -O /tmp/toolchain.tar.xz
        tar xf /tmp/toolchain.tar.xz -C "$TOOLCHAIN_DIR"

    - name: Build Package
      run: |
        export THEOS=/home/runner/theos
        chmod +x layout/DEBIAN/postinst layout/DEBIAN/prerm
        make clean
        make package FINALPACKAGE=1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatNoAds74-deb
        path: .theos/obj/*.deb
        if-no-files-found: warn
