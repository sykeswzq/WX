name: Build WeChatNoAds74

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fakeroot dpkg build-essential make perl curl zip git libz3-dev

    - name: Setup Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        # Download SDK
        mkdir -p $THEOS/sdks
        curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar xz -C $THEOS/sdks --strip-components=1
        # Download toolchain
        mkdir -p $THEOS/toolchain
        curl -sL https://github.com/kabiroberai/swift-toolchain-linux/releases/download/v2.2.1/swift-5.7-ubuntu20.04.tar.xz | tar xJ -C $THEOS/toolchain
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        echo "PATH=$THEOS/bin:$THEOS/toolchain/linux/host/bin:$PATH" >> $GITHUB_ENV
        ls $THEOS/toolchain/ && ls $THEOS/sdks/
        
    - name: Build Package
      run: |
        chmod +x layout/DEBIAN/postinst layout/DEBIAN/prerm`nmake clean
        make package FINALPACKAGE=1
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatNoAds74
        path: packages/*.deb
